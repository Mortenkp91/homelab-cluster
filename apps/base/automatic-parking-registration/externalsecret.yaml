apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: license-plate
  namespace: automatic-parking-registration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: license-plate
    creationPolicy: Owner
  data:
    - secretKey: LICENSE_PLATE
      remoteRef:
        key: license-plate
