apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: license-plate
  namespace: automatic-parking-registration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: license-plate
    creationPolicy: Owner
  data:
    - secretKey: LICENSE_PLATE
      remoteRef:
        key: license-plate
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: phone-number
  namespace: automatic-parking-registration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: phone-number
    creationPolicy: Owner
  data:
    - secretKey: PHONE_NUMBER
      remoteRef:
        key: phone-number
