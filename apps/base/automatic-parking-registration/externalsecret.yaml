apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: automatic-parking-registration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"Mortenkp91","password":"{{ .GHCR_READ_TOKEN }}","auth":"{{ printf "%s:%s" "Mortenkp91" .GHCR_READ_TOKEN | b64enc }}"}}}
  data:
    - secretKey: GHCR_READ_TOKEN
      remoteRef:
        key: ghcr-read-token
