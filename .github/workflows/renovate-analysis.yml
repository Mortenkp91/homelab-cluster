name: Renovate Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  analyze:
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'renovate:needs-analysis')
    runs-on: ubuntu-latest
    env:
      MODEL: openai/gpt-5-mini
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        run: |
          set -euo pipefail
          declare -A LABELS=(
            [renovate:needs-analysis]="fbca04|Renovate minor/major PR awaiting risk analysis"
            [risk:low]="0e8a16|Low blast-radius dependency change"
            [risk:medium]="fbca04|Medium blast-radius dependency change"
            [risk:high]="d93f0b|High blast-radius dependency change"
            [risk:critical]="b60205|Critical/breaking dependency change"
            [needs-review]="5319e7|Requires human review before merge"
          )
          for name in "${!LABELS[@]}"; do
            IFS='|' read -r color desc <<<"${LABELS[$name]}"
            gh label create "$name" --color "$color" --description "$desc" --force >/dev/null
          done

      - name: Gather PR context
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --json title,body,labels > /tmp/pr.json
          gh pr diff "$PR_NUMBER" > /tmp/pr.diff || true
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/pr.files

      - name: Render user prompt
        env:
          TEMPLATE_PATH: .github/prompts/renovate-user.md
        run: |
          set -euo pipefail
          export TITLE=$(jq -r .title /tmp/pr.json)
          export BODY=$(jq -r .body /tmp/pr.json | head -c 8000)
          export DIFF=$(head -c 16000 /tmp/pr.diff)
          export FILES=$(cat /tmp/pr.files)

          python3 - <<'PY'
          import os, pathlib
          tpl = pathlib.Path(os.environ["TEMPLATE_PATH"]).read_text()
          for key in ("TITLE", "BODY", "DIFF", "FILES"):
              tpl = tpl.replace("{{" + key + "}}", os.environ.get(key, ""))
          pathlib.Path("/tmp/prompt.md").write_text(tpl)
          PY

      - name: Run AI analysis
        id: ai
        uses: actions/ai-inference@v2
        with:
          model: ${{ env.MODEL }}
          max-completion-tokens: 1500
          system-prompt-file: .github/prompts/renovate-system.md
          prompt-file: /tmp/prompt.md

      - name: Parse response and post comment
        env:
          RESPONSE: ${{ steps.ai.outputs.response }}
        run: |
          set -euo pipefail
          printf '%s' "$RESPONSE" > /tmp/response.raw

          # Strip accidental markdown fences if model added them despite instructions
          sed -E '1s/^```json//; 1s/^```//; $s/```$//' /tmp/response.raw > /tmp/response.json

          if jq empty /tmp/response.json 2>/dev/null; then
            SEVERITY=$(jq -r '.severity // "unknown"' /tmp/response.json)
            SUMMARY=$(jq -r '.summary // "(no summary)"' /tmp/response.json)
            RECOMMENDATION=$(jq -r '.recommendation // "needs-review"' /tmp/response.json)
            REASONING=$(jq -r '.reasoning // ""' /tmp/response.json)
            AFFECTED=$(jq -r '.affected_components // [] | map("- " + .) | join("\n")' /tmp/response.json)
            BREAKING=$(jq -r '.breaking_signals // [] | map("- " + .) | join("\n")' /tmp/response.json)
            HIGHLIGHTS=$(jq -r '.release_note_highlights // [] | map("- " + .) | join("\n")' /tmp/response.json)
            PARSE_OK=1
          else
            SEVERITY="unknown"
            RECOMMENDATION="needs-review"
            PARSE_OK=0
          fi

          {
            echo "<!-- claude-renovate-analysis -->"
            echo "## Renovate risk analysis"
            echo ""
            if [ "$PARSE_OK" = "1" ]; then
              echo "**Severity:** \`$SEVERITY\` &nbsp; **Recommendation:** \`$RECOMMENDATION\`"
              echo ""
              echo "**Summary:** $SUMMARY"
              echo ""
              echo "### Affected components"
              echo "${AFFECTED:-_none identified_}"
              echo ""
              echo "### Release-note highlights"
              echo "${HIGHLIGHTS:-_none extracted_}"
              echo ""
              echo "### Breaking-change signals"
              echo "${BREAKING:-_none_}"
              echo ""
              echo "### Reasoning"
              echo "$REASONING"
            else
              echo "**Severity:** \`unknown\` &nbsp; **Recommendation:** \`needs-review\`"
              echo ""
              echo "Could not parse model response as JSON. Raw output below."
              echo ""
              echo '```'
              head -c 4000 /tmp/response.raw
              echo ""
              echo '```'
            fi
            echo ""
            echo "---"
            echo "<sub>Generated by \`.github/workflows/renovate-analysis.yml\` using \`$MODEL\` via GitHub Models. Re-run by removing and re-adding the \`renovate:needs-analysis\` label.</sub>"
          } > /tmp/comment.md

          # Upsert: edit existing comment with our marker, else create new
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- claude-renovate-analysis -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING" \
              --method PATCH --field body=@/tmp/comment.md >/dev/null
            echo "Updated existing comment $EXISTING"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          fi

          # Apply risk label (clear any previous risk:* first to avoid stacking)
          for old in risk:low risk:medium risk:high risk:critical; do
            gh pr edit "$PR_NUMBER" --remove-label "$old" 2>/dev/null || true
          done
          if [ "$SEVERITY" != "unknown" ]; then
            gh pr edit "$PR_NUMBER" --add-label "risk:$SEVERITY"
          fi

          # Apply needs-review unless model said auto-merge-safe (rare for minor/major but possible)
          if [ "$RECOMMENDATION" != "auto-merge-safe" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-review"
          fi
